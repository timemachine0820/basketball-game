<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>巢湖篮球经理 - 赛季排行榜</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .lb-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.4rem 0.6rem;
      background: #1a1a3e;
      border: 2px solid #ff9800;
      border-radius: 3px;
      margin-bottom: 0.5rem;
    }
    .lb-season-label {
      font-size: 0.7rem;
      color: #ff9800;
    }
    .lb-my-points {
      font-size: 0.85rem;
      color: #ffd700;
      font-weight: bold;
    }
    .lb-my-points span {
      font-size: 0.65rem;
      color: #aaa;
      font-weight: normal;
    }
    .lb-list {
      margin-bottom: 0.5rem;
    }
    .lb-item {
      display: flex;
      align-items: center;
      padding: 0.4rem 0.6rem;
      margin-bottom: 0.2rem;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 3px;
    }
    .lb-item.me {
      border-color: #ff9800;
      background: #1a1a3e;
    }
    .lb-rank-num {
      width: 1.5rem;
      font-size: 0.8rem;
      color: #ff9800;
      font-weight: bold;
      text-align: center;
      flex-shrink: 0;
    }
    .lb-rank-num.top3 {
      color: #ffd700;
    }
    .lb-nick {
      flex: 1;
      font-size: 0.75rem;
      color: #e0e0e0;
      margin-left: 0.3rem;
    }
    .lb-nick.me-nick {
      color: #ff9800;
    }
    .lb-score {
      font-size: 0.75rem;
      color: #ffd700;
      flex-shrink: 0;
    }
    .lb-reset-section {
      margin-top: 0.8rem;
    }
    .lb-reset-btn {
      width: 100%;
      font-size: 0.7rem;
    }
    .lb-empty {
      text-align: center;
      color: #666;
      font-size: 0.75rem;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <!-- 顶部标题栏 -->
  <div class="home-header">
    <span class="home-title">赛季排行榜</span>
    <span class="home-nickname" id="nicknameDisplay">加载中...</span>
  </div>

  <div class="home-content">
    <!-- 赛季信息 -->
    <div class="lb-header">
      <span class="lb-season-label" id="seasonLabel">赛季 1</span>
      <span class="lb-my-points"><span>我的积分 </span><span id="myPoints">0</span></span>
    </div>

    <!-- 排行榜列表 -->
    <div class="panel-title">积分排行 TOP20</div>
    <div class="lb-list" id="leaderboardList"></div>

    <!-- 赛季重置 -->
    <div class="lb-reset-section">
      <button class="pixel-btn lb-reset-btn" id="btnReset">赛季重置</button>
    </div>
  </div>

  <!-- 底部导航栏 -->
  <div class="bottom-nav">
    <div class="nav-item" id="navHome">
      <span class="nav-icon">&#9733;</span>
      <span>主页</span>
    </div>
    <div class="nav-item" id="navCards">
      <span class="nav-icon">&#9827;</span>
      <span>卡牌</span>
    </div>
    <div class="nav-item" id="navDeck">
      <span class="nav-icon">&#9812;</span>
      <span>阵容</span>
    </div>
    <div class="nav-item" id="navBattle">
      <span class="nav-icon">&#9876;</span>
      <span>对战</span>
    </div>
    <div class="nav-item" id="navDraw">
      <span class="nav-icon">&#9830;</span>
      <span>抽卡</span>
    </div>
  </div>

  <div style="height: 4.5rem;"></div>

  <!-- 重置确认弹窗 -->
  <div class="result-mask" id="resetMask" style="display:none;">
    <div class="result-panel pixel-border" style="padding:1rem;">
      <div class="result-section-title">确认赛季重置？</div>
      <p style="font-size:0.7rem;color:#aaa;text-align:center;margin:0.6rem 0;">所有玩家积分清零，进入新赛季。<br>卡牌、资源、成就不受影响。</p>
      <button class="pixel-btn primary" id="btnConfirmReset" style="width:100%;margin-bottom:0.4rem;">确认重置</button>
      <button class="pixel-btn" id="btnCancelReset" style="width:100%;">取消</button>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script>
    if (!localStorage.getItem('player_id')) {
      window.location.href = 'index.html';
    }

    // 导航
    document.getElementById('navHome').addEventListener('click', () => { window.location.href = 'home.html'; });
    document.getElementById('navCards').addEventListener('click', () => { window.location.href = 'cards.html'; });
    document.getElementById('navDeck').addEventListener('click', () => { window.location.href = 'lineup.html'; });
    document.getElementById('navBattle').addEventListener('click', () => { window.location.href = 'pvp.html'; });
    document.getElementById('navDraw').addEventListener('click', () => { window.location.href = 'draw.html'; });

    let myPlayerId = null;

    async function loadPage() {
      const infoRes = await API.get('/api/player/info');
      if (infoRes.code === 0) {
        document.getElementById('nicknameDisplay').textContent = infoRes.data.nickname;
        document.getElementById('seasonLabel').textContent = '赛季 ' + infoRes.data.current_season;
        myPlayerId = infoRes.data.player_id;
      }

      const seasonRes = await API.get('/api/player/season');
      if (seasonRes.code === 0) {
        document.getElementById('myPoints').textContent = seasonRes.data.season_points;
      }

      loadLeaderboard();
    }

    async function loadLeaderboard() {
      const res = await API.get('/api/pvp/leaderboard');
      if (res.code !== 0) return;

      const list = res.data.list || [];
      const el = document.getElementById('leaderboardList');

      if (list.length === 0) {
        el.innerHTML = '<div class="lb-empty">暂无排行数据</div>';
        return;
      }

      el.innerHTML = list.map(item => {
        const rankClass = item.rank <= 3 ? 'top3' : '';
        const rankText = item.rank <= 3 ? ['🥇', '🥈', '🥉'][item.rank - 1] : item.rank;
        const isMe = myPlayerId && item.nickname === localStorage.getItem('nickname');
        return `<div class="lb-item${isMe ? ' me' : ''}">
          <span class="lb-rank-num ${rankClass}">${rankText}</span>
          <span class="lb-nick${isMe ? ' me-nick' : ''}">${item.nickname}
            ${item.signature ? `<span style="font-size:0.55rem;color:#aaa;margin-left:0.2rem;">${item.signature}</span>` : ''}
          </span>
          <span>
            <span class="rank-badge" style="background:${item.rankColor};color:#fff;font-size:0.6rem;padding:0.1rem 0.3rem;border-radius:2px;">${item.rankLabel}</span>
            <span class="lb-score" style="margin-left:0.2rem;">${item.points} 分</span>
          </span>
        </div>`;
      }).join('');
    }

    // 赛季重置
    document.getElementById('btnReset').addEventListener('click', () => {
      document.getElementById('resetMask').style.display = 'flex';
    });
    document.getElementById('btnCancelReset').addEventListener('click', () => {
      document.getElementById('resetMask').style.display = 'none';
    });
    document.getElementById('btnConfirmReset').addEventListener('click', async () => {
      const res = await API.post('/api/player/season-reset');
      if (res.code !== 0) {
        showToast(res.msg || '重置失败');
        return;
      }
      showToast('赛季已重置，进入第 ' + res.data.season_num + ' 赛季');
      document.getElementById('resetMask').style.display = 'none';
      loadPage();
    });

    loadPage();
  </script>
</body>
</html>
