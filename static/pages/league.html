<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>巢湖篮球经理 - 梯队联赛</title>
  <link rel="stylesheet" href="../css/base.css">   <link rel="stylesheet" href="../css/components.css">   <link rel="stylesheet" href="../css/layout.css">   <link rel="stylesheet" href="../css/pages.css">   <link rel="stylesheet" href="../css/animations.css">
  <style>
    .tier-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }
    .tier-card {
      display: flex;
      align-items: center;
      padding: 0.6rem 0.8rem;
      background: #12122a;
      border: 3px solid #4a4a8a;
      border-radius: 4px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s;
    }
    .tier-card:active { transform: scale(0.98); }
    .tier-card.selected { border-color: #ff9800; }
    .tier-card.locked { opacity: 0.5; }
    .tier-icon {
      width: 1.6rem;
      height: 1.6rem;
      border-radius: 3px;
      margin-right: 0.5rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 1px 1px 0 #000;
    }
    .tier-bronze { background: linear-gradient(135deg, #cd7f32, #a0522d); }
    .tier-silver { background: linear-gradient(135deg, #c0c0c0, #808080); }
    .tier-gold { background: linear-gradient(135deg, #ffd700, #daa520); }
    .tier-info { flex: 1; min-width: 0; }
    .tier-name { font-size: 0.85rem; color: #e0e0e0; font-weight: bold; }
    .tier-reward { font-size: 0.6rem; color: #888; margin-top: 0.1rem; }
    .tier-remain {
      font-size: 0.7rem;
      color: #ff9800;
      flex-shrink: 0;
      margin-left: 0.5rem;
      white-space: nowrap;
    }
    .tier-remain.empty { color: #ff5252; }
    .battle-vs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 0;
      margin-bottom: 0.5rem;
    }
    .battle-vs-text {
      font-size: 1.4rem;
      color: #ff9800;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
      padding: 0 0.5rem;
      flex-shrink: 0;
    }
    .battle-team { flex: 1; min-width: 0; }
    .battle-team-title {
      font-size: 0.75rem;
      text-align: center;
      margin-bottom: 0.3rem;
      padding-bottom: 0.2rem;
      border-bottom: 1px solid #2a2a4a;
    }
    .battle-team-title.mine { color: #6a9aff; }
    .battle-team-title.enemy { color: #ff5252; }
    .battle-player-item {
      display: flex;
      align-items: center;
      padding: 0.3rem 0.4rem;
      margin-bottom: 0.15rem;
      background: #12122a;
      border: 2px solid #2a2a4a;
      border-radius: 3px;
    }
    .battle-player-item .grade-tag { margin-right: 0.3rem; flex-shrink: 0; }
    .battle-player-name {
      flex: 1;
      font-size: 0.65rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .battle-player-pos { font-size: 0.55rem; color: #888; margin-left: 0.2rem; flex-shrink: 0; }
    .battle-player-stars { font-size: 0.5rem; color: #ffd700; margin-left: 0.2rem; flex-shrink: 0; }
    .league-battle-btn { display: block; width: 100%; margin: 0.6rem 0; }
    .league-subtitle {
      text-align: center;
      font-size: 0.6rem;
      color: #666;
      margin-top: -0.4rem;
      margin-bottom: 0.5rem;
    }
    /* 结果弹窗 */
    .result-mask {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }
    .result-panel { width: 95%; max-width: 24rem; max-height: 85vh; overflow-y: auto; }
    .result-header { text-align: center; padding: 0.5rem 0; border-bottom: 2px solid #4a4a8a; margin-bottom: 0.4rem; }
    .result-win { font-size: 1.4rem; color: #ffd700; font-weight: bold; text-shadow: 2px 2px 0 #000; }
    .result-lose { font-size: 1.4rem; color: #ff5252; font-weight: bold; text-shadow: 2px 2px 0 #000; }
    .result-score { font-size: 0.85rem; color: #aaa; margin-top: 0.2rem; }
    .result-reward { text-align: center; padding: 0.4rem; margin-bottom: 0.4rem; border: 1px dashed #4a4a8a; border-radius: 3px; }
    .result-reward-label { font-size: 0.7rem; color: #888; margin-bottom: 0.2rem; }
    .result-reward-values { font-size: 0.85rem; color: #ffd700; }
    .result-section-title {
      font-size: 0.7rem; color: #ff9800;
      border-bottom: 1px solid #4a4a8a;
      padding-bottom: 0.15rem; margin-bottom: 0.2rem;
    }
    .result-table { width: 100%; border-collapse: collapse; font-size: 0.6rem; margin-bottom: 0.5rem; }
    .result-table th { color: #888; padding: 0.2rem 0.1rem; text-align: center; border-bottom: 1px solid #2a2a4a; font-weight: normal; }
    .result-table td { padding: 0.2rem 0.1rem; text-align: center; color: #e0e0e0; border-bottom: 1px solid #1a1a2e; }
    .result-table .player-name-cell { text-align: left; max-width: 3.5rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .empty-hint { text-align: center; color: #ff5252; font-size: 0.8rem; padding: 1.5rem 0; }
    .empty-hint a { color: #6a9aff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="home-header">
    <span class="home-title">梯队联赛</span>
    <span class="home-nickname" id="nicknameDisplay">加载中...</span>
  </div>

  <div class="home-content">
    <!-- 梯度选择 -->
    <div class="panel-title">选择联赛</div>
    <div class="tier-list" id="tierList"></div>

    <!-- 对战区域（选中梯度后显示） -->
    <div id="battleArea" style="display:none;">
      <div class="battle-vs">
        <div class="battle-team">
          <div class="battle-team-title mine">我方阵容</div>
          <div id="myTeamCards"></div>
        </div>
        <div class="battle-vs-text">VS</div>
        <div class="battle-team">
          <div class="battle-team-title enemy" id="aiTeamTitle">对手</div>
          <div id="aiTeamCards"></div>
        </div>
      </div>
      <button class="pixel-btn primary league-battle-btn" id="btnBattle">挑战</button>
      <div class="league-subtitle">胜利获得碎片+钻石（按梯度递增）</div>
    </div>
  </div>

  <div id="navContainer"></div>
  <div style="height: 4.5rem;"></div>

  <!-- 结果弹窗 -->
  <div class="result-mask" id="resultMask" style="display:none;">
    <div class="result-panel pixel-border">
      <div class="result-header">
        <div id="resultTitle"></div>
        <div class="result-score" id="resultScore"></div>
      </div>
      <div class="result-reward" id="resultReward"></div>
      <div class="result-section-title">我方数据</div>
      <table class="result-table"><thead><tr><th>球员</th><th>位置</th><th>得分</th><th>篮板</th><th>助攻</th><th>抢断</th><th>盖帽</th></tr></thead><tbody id="myStatsBody"></tbody></table>
      <div class="result-section-title">对手数据</div>
      <table class="result-table"><thead><tr><th>球员</th><th>位置</th><th>得分</th><th>篮板</th><th>助攻</th><th>抢断</th><th>盖帽</th></tr></thead><tbody id="aiStatsBody"></tbody></table>
      <button class="pixel-btn primary" id="btnResultClose" style="margin-top:0.5rem;">继续挑战</button>
    </div>
  </div>

  <script src="../js/core/router.js"></script>
  <script src="../js/core/store.js"></script>
  <script src="../js/components/nav.js"></script>
  <script>renderBottomNav('league');</script>
  <script src="../js/components/modal.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="/config/game-config.js"></script>
  <script>
    if (!localStorage.getItem('player_id')) {
      window.location.href = 'index.html';
    }

    const TIER_COLORS = { bronze: '#cd7f32', silver: '#c0c0c0', gold: '#ffd700' };
    let tiersData = [];
    let selectedTier = null;
    let myCards = [];
    let isBattling = false;

    // 导航
    
    
    
    

    function renderTiers() {
      const el = document.getElementById('tierList');
      el.innerHTML = tiersData.map(t => {
        const remainCls = t.remaining <= 0 ? ' empty' : '';
        return `<div class="tier-card pixel-border${selectedTier === t.tier ? ' selected' : ''}${t.remaining <= 0 ? ' locked' : ''}" data-tier="${t.tier}">
          <div class="tier-icon tier-${t.tier}">${t.label.charAt(0)}</div>
          <div class="tier-info">
            <div class="tier-name">${t.label}</div>
            <div class="tier-reward">胜: 碎片+${t.reward.shard} 钻石+${t.reward.diamond}</div>
          </div>
          <div class="tier-remain${remainCls}">${t.remaining}/${t.dailyLimit}</div>
        </div>`;
      }).join('');

      el.querySelectorAll('.tier-card').forEach(card => {
        card.addEventListener('click', () => {
          const tier = card.dataset.tier;
          const tierData = tiersData.find(t => t.tier === tier);
          if (tierData && tierData.remaining <= 0) {
            showToast('今日次数已用完');
            return;
          }
          selectedTier = tier;
          renderTiers();
          showBattleArea();
        });
      });
    }

    function showBattleArea() {
      const tierData = tiersData.find(t => t.tier === selectedTier);
      if (!tierData) return;

      document.getElementById('aiTeamTitle').textContent = tierData.label;
      document.getElementById('aiTeamCards').innerHTML = tierData.roster.map(c => {
        const color = gradeColor(c.grade);
        return `<div class="battle-player-item" style="border-color:${color};">
          <span class="grade-tag grade-${c.grade}">${c.grade}</span>
          <span class="battle-player-name" style="color:${color};">${c.role_name}</span>
          <span class="battle-player-pos">${c.pos}</span>
          <span class="battle-player-stars">${'★'.repeat(c.star)}</span>
        </div>`;
      }).join('');

      document.getElementById('battleArea').style.display = 'block';
    }

    function renderMyTeam() {
      const el = document.getElementById('myTeamCards');
      el.innerHTML = myCards.map(c => {
        const color = gradeColor(c.grade);
        return `<div class="battle-player-item" style="border-color:${color};">
          <span class="grade-tag grade-${c.grade}">${c.grade}</span>
          <span class="battle-player-name" style="color:${color};">${c.role_name}</span>
          <span class="battle-player-pos">${c.pos}</span>
          <span class="battle-player-stars">${'★'.repeat(c.star)}</span>
        </div>`;
      }).join('');
    }

    function renderStatsRow(p) {
      return `<tr>
        <td class="player-name-cell" style="color:${gradeColor(p.grade)};">${p.name}</td>
        <td>${p.pos}</td><td>${p.score}</td><td>${p.rebound}</td>
        <td>${p.assist}</td><td>${p.steal}</td><td>${p.block}</td>
      </tr>`;
    }

    // 加载数据
    async function loadData() {
      const infoRes = await API.get('/api/player/info');
      if (infoRes.code === 0) {
        document.getElementById('nicknameDisplay').textContent = infoRes.data.nickname;
      }

      const deckRes = await API.get('/api/player/deck');
      if (deckRes.code !== 0) return;
      const deck = deckRes.data;
      if (!deck.slot1_card || !deck.slot2_card || !deck.slot3_card || !deck.slot4_card || !deck.slot5_card) {
        document.getElementById('myTeamCards').innerHTML = '<div class="empty-hint">阵容未填满<br>请先 <a href="lineup.html">设置阵容</a></div>';
        return;
      }

      const cardsRes = await API.get('/api/player/cards');
      if (cardsRes.code !== 0) return;
      const allCards = cardsRes.data || [];
      const uids = [deck.slot1_card, deck.slot2_card, deck.slot3_card, deck.slot4_card, deck.slot5_card];
      myCards = uids.map(uid => allCards.find(c => c.card_uid === uid)).filter(Boolean);
      if (myCards.length === 5) renderMyTeam();

      const tierRes = await API.get('/api/league/tiers');
      if (tierRes.code !== 0) return;
      tiersData = tierRes.data.tiers;
      renderTiers();
    }

    // 挑战
    document.getElementById('btnBattle').addEventListener('click', debounce(async () => {
      if (isBattling || !selectedTier) return;
      isBattling = true;
      const btn = document.getElementById('btnBattle');
      btn.textContent = '对战中...';
      btn.disabled = true;
      try {
      const res = await API.post('/api/league/battle', { tier: selectedTier });

      if (res.code !== 0) {
        showToast(res.msg || '挑战失败');
        return;
      }
      const data = res.data;

      document.getElementById('resultTitle').innerHTML = data.win
        ? '<div class="result-win">胜 利!</div>'
        : '<div class="result-lose">落 败</div>';
      document.getElementById('resultScore').textContent = data.attScore + ' : ' + data.defScore;

      if (data.win) {
        document.getElementById('resultReward').innerHTML =
          '<div class="result-reward-label">获得奖励</div>' +
          '<div class="result-reward-values">碎片 +' + data.reward.shard + '  钻石 +' + data.reward.diamond + '</div>';
        localStorage.setItem('shard', data.updatedShard);
        localStorage.setItem('diamond', data.updatedDiamond);
      } else {
        document.getElementById('resultReward').innerHTML =
          '<div class="result-reward-label" style="color:#888;">未获得奖励</div>';
      }

      document.getElementById('myStatsBody').innerHTML = sortByPosition(data.myCards).map(renderStatsRow).join('');
      document.getElementById('aiStatsBody').innerHTML = sortByPosition(data.aiCards).map(renderStatsRow).join('');
      document.getElementById('resultMask').style.display = 'flex';

      // 刷新梯度列表（更新剩余次数）
      const tierRes = await API.get('/api/league/tiers');
      if (tierRes.code === 0) {
        tiersData = tierRes.data.tiers;
        renderTiers();
        if (selectedTier) showBattleArea();
      }
      } catch (e) { showToast('请求失败，请重试'); }
      finally { isBattling = false; if (btn.textContent === '对战中...') { btn.textContent = '挑战'; btn.disabled = false; } }
    }, 800));

    document.getElementById('btnResultClose').addEventListener('click', () => {
      document.getElementById('resultMask').style.display = 'none';
    });

    loadData();
  </script>
</body>
</html>
