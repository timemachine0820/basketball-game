<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员后台 - 篮球卡牌游戏</title>
  <style>
    @media screen and (max-width: 768px) {
      body::after {
        content: '请使用PC端访问管理后台';
        position: fixed; inset: 0; background: #0d0d1a;
        color: #ff9800; display: flex; align-items: center; justify-content: center;
        font-size: 1.2rem; z-index: 99999;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif; background: #0f1923; color: #e0e0e0; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a2332; }
    ::-webkit-scrollbar-thumb { background: #3a4a5a; border-radius: 3px; }

    /* ===== Login ===== */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0f1923; }
    .login-box { width: 380px; background: #1a2332; border: 1px solid #2a3a4a; border-radius: 8px; padding: 2.5rem 2rem; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .login-box h2 { text-align: center; color: #ff9800; font-size: 1.4rem; margin-bottom: 0.3rem; }
    .login-box p { text-align: center; color: #667; font-size: 0.8rem; margin-bottom: 1.8rem; }
    .login-box .field { margin-bottom: 1rem; }
    .login-box label { display: block; font-size: 0.75rem; color: #889; margin-bottom: 0.3rem; }
    .login-box input[type="text"], .login-box input[type="password"] {
      width: 100%; padding: 0.6rem 0.8rem; background: #0d1520; border: 1px solid #2a3a4a;
      border-radius: 4px; color: #e0e0e0; font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: #ff9800; }
    .login-box .btn-login {
      width: 100%; padding: 0.7rem; background: #ff9800; color: #000; border: none;
      border-radius: 4px; font-size: 0.95rem; font-weight: bold; cursor: pointer; margin-top: 0.5rem;
    }
    .login-box .btn-login:hover { background: #ffb740; }
    .login-error { background: rgba(180,40,40,0.15); border: 1px solid #aa4444; border-radius: 4px; color: #ff6b6b; padding: 0.5rem; margin-bottom: 0.8rem; font-size: 0.8rem; text-align: center; display: none; }

    /* ===== Layout ===== */
    .admin-layout { display: none; height: 100vh; }
    .admin-layout.show { display: flex; }
    .sidebar { width: 200px; background: #111920; border-right: 1px solid #1e2d3d; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-brand { padding: 1rem 0.8rem; border-bottom: 1px solid #1e2d3d; }
    .sidebar-brand h3 { color: #ff9800; font-size: 1rem; }
    .sidebar-brand small { color: #556; font-size: 0.7rem; }
    .sidebar-nav { flex: 1; padding: 0.5rem 0; }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 1rem;
      color: #8899aa; text-decoration: none; font-size: 0.85rem; cursor: pointer; transition: all 0.15s;
      border-left: 3px solid transparent;
    }
    .sidebar-nav a:hover { background: #1a2535; color: #ccd; }
    .sidebar-nav a.active { background: #1a2535; color: #ff9800; border-left-color: #ff9800; }
    .sidebar-nav a .icon { width: 1.2rem; text-align: center; }
    .sidebar-footer { padding: 0.8rem 1rem; border-top: 1px solid #1e2d3d; font-size: 0.75rem; color: #556; }
    .sidebar-footer .admin-name { color: #ff9800; }
    .sidebar-footer a { color: #889; text-decoration: none; cursor: pointer; float: right; }
    .sidebar-footer a:hover { color: #ff6b6b; }
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .main-header { padding: 0.8rem 1.5rem; background: #151f2b; border-bottom: 1px solid #1e2d3d; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .main-header h2 { font-size: 1rem; color: #e0e0e0; font-weight: 500; }
    .main-header .actions { display: flex; gap: 0.5rem; }
    .main-content { flex: 1; overflow-y: auto; padding: 1.2rem 1.5rem; }
    .page { display: none; }
    .page.active { display: block; }

    /* ===== Components ===== */
    .card { background: #1a2332; border: 1px solid #1e2d3d; border-radius: 6px; margin-bottom: 1rem; }
    .card-header { padding: 0.7rem 1rem; border-bottom: 1px solid #1e2d3d; display: flex; align-items: center; justify-content: space-between; }
    .card-header h3 { font-size: 0.9rem; font-weight: 500; }
    .card-body { padding: 1rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem; margin-bottom: 1rem; }
    .stat-card { background: #1a2332; border: 1px solid #1e2d3d; border-radius: 6px; padding: 1rem; }
    .stat-card .label { font-size: 0.7rem; color: #667; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 1.4rem; font-weight: 600; color: #ff9800; margin-top: 0.2rem; }
    .stat-card .sub { font-size: 0.7rem; color: #556; margin-top: 0.15rem; }
    .btn {
      padding: 0.4rem 0.8rem; border: 1px solid #2a3a4a; border-radius: 4px;
      background: #1a2332; color: #ccd; font-size: 0.8rem; cursor: pointer; transition: all 0.15s;
    }
    .btn:hover { border-color: #4a5a6a; background: #223344; }
    .btn-primary { background: #ff9800; color: #000; border-color: #ff9800; }
    .btn-primary:hover { background: #ffb740; }
    .btn-danger { background: #aa4444; color: #fff; border-color: #aa4444; }
    .btn-danger:hover { background: #cc5555; }
    .btn-success { background: #2e7d32; color: #fff; border-color: #2e7d32; }
    .btn-success:hover { background: #388e3c; }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
    input[type="text"], input[type="number"], select {
      padding: 0.4rem 0.6rem; background: #0d1520; border: 1px solid #2a3a4a;
      border-radius: 4px; color: #e0e0e0; font-size: 0.8rem; outline: none;
    }
    input:focus, select:focus { border-color: #ff9800; }
    .toolbar { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .toolbar input, .toolbar select { min-width: 140px; }

    /* ===== Table ===== */
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .data-table th { background: #111920; color: #8899aa; padding: 0.55rem 0.6rem; text-align: left; font-weight: 500; position: sticky; top: 0; border-bottom: 1px solid #1e2d3d; white-space: nowrap; }
    .data-table td { padding: 0.5rem 0.6rem; border-bottom: 1px solid #151f2b; white-space: nowrap; }
    .data-table tr:hover td { background: #151f2b; }
    .data-table input[type="number"] { width: 70px; padding: 0.2rem 0.3rem; font-size: 0.75rem; text-align: right; }
    .data-table .actions-cell { display: flex; gap: 0.3rem; }
    .data-table .badge { display: inline-block; padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.7rem; font-weight: 500; }
    .badge-gold { background: rgba(255,152,0,0.15); color: #ffb740; }
    .badge-diamond { background: rgba(100,181,246,0.15); color: #64b5f6; }
    .badge-shard { background: rgba(129,199,132,0.15); color: #81c784; }
    .badge-s { background: rgba(255,152,0,0.15); color: #ff9800; }
    .checkbox-cell { width: 30px; text-align: center; }
    .checkbox-cell input { accent-color: #ff9800; width: 14px; height: 14px; cursor: pointer; }

    /* ===== Modal ===== */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 200; }
    .modal-overlay.show { display: flex; }
    .modal { background: #1a2332; border: 1px solid #2a3a4a; border-radius: 8px; width: 520px; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .modal-header { padding: 0.8rem 1rem; border-bottom: 1px solid #1e2d3d; display: flex; align-items: center; justify-content: space-between; }
    .modal-header h3 { font-size: 0.95rem; }
    .modal-close { background: none; border: none; color: #667; font-size: 1.2rem; cursor: pointer; }
    .modal-close:hover { color: #ff6b6b; }
    .modal-body { padding: 1rem; }
    .modal-footer { padding: 0.7rem 1rem; border-top: 1px solid #1e2d3d; display: flex; justify-content: flex-end; gap: 0.5rem; }
    .form-row { display: grid; grid-template-columns: 80px 1fr; gap: 0.5rem; align-items: center; margin-bottom: 0.6rem; }
    .form-row label { font-size: 0.8rem; color: #8899aa; text-align: right; }
    .form-row input { width: 100%; }

    /* ===== Config ===== */
    .config-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
    .config-item { background: #111920; border: 1px solid #1e2d3d; border-radius: 4px; padding: 0.6rem 0.8rem; }
    .config-item .cl { font-size: 0.7rem; color: #667; }
    .config-item .cv { font-size: 1rem; color: #ff9800; font-weight: 600; margin-top: 0.15rem; }

    /* ===== Toast ===== */
    .toast { position: fixed; top: 1rem; right: 1rem; background: #1a2332; border: 1px solid #ff9800; color: #ff9800; padding: 0.6rem 1rem; border-radius: 4px; font-size: 0.85rem; z-index: 999; transform: translateX(120%); transition: transform 0.3s; }
    .toast.show { transform: translateX(0); }
  </style>
</head>
<body>
  <!-- Login -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-box">
      <h2>篮球卡牌管理后台</h2>
      <p>Basketball Card Game Admin</p>
      <div class="login-error" id="loginError"></div>
      <div class="field">
        <label>用户名</label>
        <input type="text" id="loginUser" placeholder="admin" autocomplete="off">
      </div>
      <div class="field">
        <label>密码</label>
        <input type="password" id="loginPass" placeholder="请输入密码" autocomplete="off">
      </div>
      <button class="btn-login" onclick="doLogin()">登 录</button>
    </div>
  </div>

  <!-- Main Layout -->
  <div class="admin-layout" id="adminLayout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-brand">
        <h3>篮球卡牌管理</h3>
        <small>Game Admin Panel</small>
      </div>
      <div class="sidebar-nav">
        <a class="active" data-page="dashboard" onclick="switchPage('dashboard')">
          <span class="icon">&#9632;</span> 概览
        </a>
        <a data-page="players" onclick="switchPage('players')">
          <span class="icon">&#9654;</span> 玩家管理
        </a>
        <a data-page="config" onclick="switchPage('config')">
          <span class="icon">&#9881;</span> 游戏配置
        </a>
        <a data-page="clear" onclick="switchPage('clear')">
          <span class="icon">&#9249;</span> 数据清理
        </a>
      </div>
      <div class="sidebar-footer">
        <span>管理员: <span class="admin-name" id="adminName"></span></span>
        <a onclick="doLogout()">退出</a>
      </div>
    </div>

    <!-- Main -->
    <div class="main-area">
      <div class="main-header">
        <h2 id="pageTitle">概览</h2>
        <div class="actions" id="headerActions"></div>
      </div>
      <div class="main-content">
        <!-- Dashboard -->
        <div class="page active" id="page-dashboard">
          <div class="stats-row" id="statsRow"></div>
          <div class="card">
            <div class="card-header"><h3>最近对战</h3></div>
            <div class="card-body"><table class="data-table" id="recentMatches"><thead><tr>
              <th>时间</th><th>类型</th><th>进攻方</th><th>防守方</th><th>比分</th><th>结果</th>
            </tr></thead><tbody></tbody></table></div>
          </div>
        </div>
        <!-- Players -->
        <div class="page" id="page-players">
          <div class="card">
            <div class="card-header">
              <div class="toolbar">
                <input type="text" id="searchInput" placeholder="搜索ID/昵称..." oninput="filterPlayers()">
                <select id="filterGrade" onchange="filterPlayers()">
                  <option value="">全部品级</option>
                  <option value="has_s">拥有S卡</option>
                  <option value="no_s">无S卡</option>
                </select>
                <select id="filterSort" onchange="filterPlayers()">
                  <option value="id">按ID排序</option>
                  <option value="gold">按金币排序</option>
                  <option value="diamond">按钻石排序</option>
                  <option value="draw">按抽卡数排序</option>
                </select>
              </div>
              <div style="display:flex;gap:0.4rem;">
                <button class="btn btn-sm" onclick="toggleBatchMode()">批量操作</button>
                <button class="btn btn-sm btn-success" onclick="exportPlayers()">导出CSV</button>
              </div>
            </div>
            <div class="card-body" style="padding:0;overflow-x:auto;">
              <table class="data-table" id="playerTable">
                <thead><tr>
                  <th class="checkbox-cell" id="batchTh" style="display:none;"><input type="checkbox" id="checkAll" onchange="toggleCheckAll()"></th>
                  <th>ID</th><th>游戏ID</th><th>昵称</th><th>金币</th><th>钻石</th><th>碎片</th><th>免费抽</th><th>卡牌</th><th>总抽</th><th>操作</th>
                </tr></thead>
                <tbody id="playerBody"></tbody>
              </table>
            </div>
          </div>
          <div id="batchPanel" class="card" style="display:none;">
            <div class="card-header"><h3>批量操作</h3><span id="selectedCount" style="color:#ff9800;font-size:0.8rem;">已选 0 人</span></div>
            <div class="card-body">
              <div class="toolbar">
                <select id="batchAction">
                  <option value="set_gold">设置金币</option>
                  <option value="add_gold">增加金币</option>
                  <option value="set_diamond">设置钻石</option>
                  <option value="add_diamond">增加钻石</option>
                  <option value="set_shard">设置碎片</option>
                  <option value="add_shard">增加碎片</option>
                  <option value="reset_draws">设置免费抽</option>
                </select>
                <input type="number" id="batchValue" placeholder="数量" min="0" style="width:100px;">
                <button class="btn btn-primary" onclick="executeBatch()">执行</button>
                <button class="btn" onclick="toggleBatchMode()">取消</button>
              </div>
            </div>
          </div>
        </div>
        <!-- Config -->
        <div class="page" id="page-config">
          <div class="card">
            <div class="card-header">
              <h3>系统配置参数</h3>
              <div style="display:flex;gap:0.4rem;">
                <button class="btn btn-sm btn-primary" onclick="saveAllConfig()">保存修改</button>
                <button class="btn btn-sm btn-danger" onclick="resetAllConfig()">重置全部</button>
              </div>
            </div>
            <div class="card-body"><div class="config-grid" id="configGrid"></div></div>
          </div>
        </div>
        <!-- Clear -->
        <div class="page" id="page-clear">
          <div class="card"><div class="card-header"><h3>玩家数据清理</h3></div>
            <div class="card-body">
              <div class="toolbar" style="margin-bottom:1rem;">
                <select id="clearPlayerSelect" style="min-width:200px;" onchange="onClearSelect()">
                  <option value="">-- 选择玩家 --</option>
                </select>
              </div>
              <div id="clearInfo" style="display:none;margin-bottom:1rem;">
                <div class="stats-row" id="clearStats"></div>
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1rem;">
                <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.85rem;cursor:pointer;"><input type="checkbox" id="clearCards" checked style="accent-color:#ff9800;"> 清空卡牌</label>
                <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.85rem;cursor:pointer;"><input type="checkbox" id="clearGold" checked style="accent-color:#ff9800;"> 清空金币</label>
                <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.85rem;cursor:pointer;"><input type="checkbox" id="clearDiamond" checked style="accent-color:#ff9800;"> 清空钻石</label>
                <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.85rem;cursor:pointer;"><input type="checkbox" id="clearShard" checked style="accent-color:#ff9800;"> 清空碎片</label>
              </div>
              <button class="btn btn-danger" onclick="confirmClear()">执行清理</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Player Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header"><h3 id="editTitle">编辑玩家</h3><button class="modal-close" onclick="closeModal('editModal')">&times;</button></div>
      <div class="modal-body">
        <div class="form-row"><label>金币</label><input type="number" id="editGold" min="0"></div>
        <div class="form-row"><label>钻石</label><input type="number" id="editDiamond" min="0"></div>
        <div class="form-row"><label>碎片</label><input type="number" id="editShard" min="0"></div>
        <div class="form-row"><label>免费抽</label><input type="number" id="editDraws" min="0"></div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('editModal')">取消</button>
        <button class="btn btn-primary" onclick="savePlayer()">保存</button>
      </div>
    </div>
  </div>

  <!-- Match History Modal -->
  <div class="modal-overlay" id="historyModal">
    <div class="modal" style="width:700px;">
      <div class="modal-header"><h3 id="historyTitle">对战记录</h3><button class="modal-close" onclick="closeModal('historyModal')">&times;</button></div>
      <div class="modal-body" style="padding:0;max-height:50vh;overflow-y:auto;">
        <table class="data-table" id="historyTable">
          <thead><tr><th>时间</th><th>类型</th><th>进攻方</th><th>防守方</th><th>比分</th><th>结果</th></tr></thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
      <div class="modal-footer"><button class="btn" onclick="closeModal('historyModal')">关闭</button></div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal" style="width:380px;">
      <div class="modal-header"><h3>确认操作</h3></div>
      <div class="modal-body"><p id="confirmMsg" style="font-size:0.9rem;color:#e0e0e0;"></p></div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('confirmModal')">取消</button>
        <button class="btn btn-danger" id="confirmBtn" onclick="">确认</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = '/api/admin';
    const ADM = {
      id: localStorage.getItem('admin_id'),
      authHeaders() { const h = {}; if(this.id) h['X-Admin-Id']=this.id; return h; },
      async post(url, data) { const r = await fetch(API_BASE+url, {method:'POST',headers:{'Content-Type':'application/json',...this.authHeaders()},body:JSON.stringify(data)}); return r.json(); },
      async get(url) { const r = await fetch(API_BASE+url, {headers:this.authHeaders()}); return r.json(); }
    };

    let allPlayers = [], selectedPlayers = new Set(), batchMode = false;
    let editingPlayerId = null;

    // === Toast ===
    function toast(msg, ms=2000) {
      const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'), ms);
    }

    // === Auth ===
    async function doLogin() {
      const u = document.getElementById('loginUser').value.trim();
      const p = document.getElementById('loginPass').value.trim();
      if (!u || !p) return showLoginError('请输入用户名和密码');
      try {
        const res = await ADM.post('/login', {username:u, password:p});
        if (res.code !== 0) return showLoginError(res.msg);
        ADM.id = res.data.admin_id;
        localStorage.setItem('admin_id', ADM.id);
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('adminLayout').classList.add('show');
        document.getElementById('adminName').textContent = res.data.username;
        loadDashboard();
      } catch(e) { showLoginError('网络异常'); }
    }
    function showLoginError(msg) {
      const el = document.getElementById('loginError'); el.textContent = msg; el.style.display = 'block';
    }
    function doLogout() {
      ADM.id = null; localStorage.removeItem('admin_id');
      document.getElementById('loginWrap').style.display = 'flex';
      document.getElementById('adminLayout').classList.remove('show');
    }

    // === Navigation ===
    function switchPage(page) {
      document.querySelectorAll('.sidebar-nav a').forEach(a=>a.classList.toggle('active', a.dataset.page===page));
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      document.getElementById('page-'+page).classList.add('active');
      const titles = {dashboard:'概览',players:'玩家管理',config:'游戏配置',clear:'数据清理'};
      document.getElementById('pageTitle').textContent = titles[page]||'';
      document.getElementById('headerActions').innerHTML = '';
      if (page==='players') {
        document.getElementById('headerActions').innerHTML = '<button class="btn btn-primary btn-sm" onclick="loadPlayers()">刷新</button>';
        loadPlayers();
      } else if (page==='dashboard') { loadDashboard(); }
      else if (page==='config') { loadConfig(); }
      else if (page==='clear') { loadClearPlayers(); }
    }

    // === Dashboard ===
    async function loadDashboard() {
      const res = await ADM.get('/players');
      if (res.code !== 0) return;
      allPlayers = res.data;
      const totalGold = allPlayers.reduce((s,p)=>s+p.gold,0);
      const totalDiamond = allPlayers.reduce((s,p)=>s+p.diamond,0);
      const totalDraw = allPlayers.reduce((s,p)=>s+p.total_draw,0);
      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card"><div class="label">玩家总数</div><div class="value">${allPlayers.length}</div></div>
        <div class="stat-card"><div class="label">总金币流通</div><div class="value">${totalGold.toLocaleString()}</div></div>
        <div class="stat-card"><div class="label">总钻石流通</div><div class="value">${totalDiamond.toLocaleString()}</div></div>
        <div class="stat-card"><div class="label">总抽卡次数</div><div class="value">${totalDraw.toLocaleString()}</div></div>
      `;
      loadRecentMatches();
    }
    async function loadRecentMatches() {
      const res = await ADM.get('/match-history/1');
      if (res.code !== 0) return;
      const tbody = document.querySelector('#recentMatches tbody');
      tbody.innerHTML = (res.data||[]).slice(0,20).map(m => `<tr>
        <td>${formatTime(m.create_time)}</td><td>${typeLabel(m.match_type)}</td>
        <td>${m.att_name||'--'}</td><td>${m.def_name||'--'}</td>
        <td>${m.att_score} : ${m.def_score}</td>
        <td>${m.is_win?'<span style="color:#66bb6a;">胜</span>':'<span style="color:#ef5350;">负</span>'}</td>
      </tr>`).join('');
    }

    // === Players ===
    async function loadPlayers() {
      const res = await ADM.get('/players');
      if (res.code === 0) { allPlayers = res.data; filterPlayers(); }
    }
    function filterPlayers() {
      const q = (document.getElementById('searchInput').value||'').toLowerCase();
      const fg = document.getElementById('filterGrade').value;
      const fs = document.getElementById('filterSort').value;
      let list = allPlayers.filter(p => {
        if (q && !String(p.player_id).includes(q) && !(p.nickname||'').toLowerCase().includes(q) && !(p.game_id||'').toLowerCase().includes(q)) return false;
        return true;
      });
      list.sort((a,b) => {
        if (fs==='gold') return b.gold-a.gold;
        if (fs==='diamond') return b.diamond-a.diamond;
        if (fs==='draw') return b.total_draw-a.total_draw;
        return a.player_id-b.player_id;
      });
      renderPlayers(list);
    }
    function renderPlayers(list) {
      const tbody = document.getElementById('playerBody');
      tbody.innerHTML = list.map(p => `<tr>
        ${batchMode?`<td class="checkbox-cell"><input type="checkbox" data-pid="${p.player_id}" ${selectedPlayers.has(p.player_id)?'checked':''} onchange="toggleSelect(${p.player_id})"></td>`:''}
        <td>${p.player_id}</td><td>${p.game_id}</td><td>${p.nickname}</td>
        <td><span class="badge badge-gold">${p.gold}</span></td>
        <td><span class="badge badge-diamond">${p.diamond}</span></td>
        <td><span class="badge badge-shard">${p.upgrade_shard}</span></td>
        <td>${p.free_draws}</td><td>${p.card_count||0}</td><td>${p.total_draw}</td>
        <td class="actions-cell">
          <button class="btn btn-sm" onclick="editPlayer(${p.player_id})">编辑</button>
          <button class="btn btn-sm" onclick="viewHistory(${p.player_id},'${p.nickname}')">记录</button>
        </td>
      </tr>`).join('');
    }

    // === Edit Player ===
    function editPlayer(pid) {
      const p = allPlayers.find(x=>x.player_id===pid);
      if (!p) return;
      editingPlayerId = pid;
      document.getElementById('editTitle').textContent = '编辑 - ' + p.nickname + ' (' + p.game_id + ')';
      document.getElementById('editGold').value = p.gold;
      document.getElementById('editDiamond').value = p.diamond;
      document.getElementById('editShard').value = p.upgrade_shard;
      document.getElementById('editDraws').value = p.free_draws;
      openModal('editModal');
    }
    async function savePlayer() {
      const res = await ADM.post('/update-player', {
        player_id: editingPlayerId,
        gold: parseInt(document.getElementById('editGold').value)||0,
        diamond: parseInt(document.getElementById('editDiamond').value)||0,
        upgrade_shard: parseInt(document.getElementById('editShard').value)||0,
        free_draws: parseInt(document.getElementById('editDraws').value)||0
      });
      closeModal('editModal');
      toast(res.msg);
      if (res.code===0) loadPlayers();
    }

    // === Match History ===
    async function viewHistory(pid, name) {
      document.getElementById('historyTitle').textContent = name + ' 的对战记录';
      const res = await ADM.get('/match-history/' + pid);
      const tbody = document.getElementById('historyBody');
      if (res.code!==0 || !res.data.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#667;">暂无记录</td></tr>'; }
      else {
        tbody.innerHTML = res.data.map(m => `<tr>
          <td>${formatTime(m.create_time)}</td><td>${typeLabel(m.match_type)}</td>
          <td>${m.att_name||'--'}</td><td>${m.def_name||'--'}</td>
          <td>${m.att_score} : ${m.def_score}</td>
          <td>${m.is_win?'<span style="color:#66bb6a;">胜</span>':'<span style="color:#ef5350;">负</span>'}</td>
        </tr>`).join('');
      }
      openModal('historyModal');
    }

    // === Batch Mode ===
    function toggleBatchMode() {
      batchMode = !batchMode;
      selectedPlayers.clear();
      document.getElementById('batchTh').style.display = batchMode ? '' : 'none';
      document.getElementById('batchPanel').style.display = 'none';
      document.getElementById('checkAll').checked = false;
      filterPlayers();
    }
    function toggleSelect(pid) {
      selectedPlayers.has(pid) ? selectedPlayers.delete(pid) : selectedPlayers.add(pid);
      document.getElementById('selectedCount').textContent = '已选 ' + selectedPlayers.size + ' 人';
      document.getElementById('batchPanel').style.display = selectedPlayers.size > 0 ? '' : 'none';
    }
    function toggleCheckAll() {
      const checked = document.getElementById('checkAll').checked;
      selectedPlayers.clear();
      if (checked) allPlayers.forEach(p=>selectedPlayers.add(p.player_id));
      document.getElementById('selectedCount').textContent = '已选 ' + selectedPlayers.size + ' 人';
      document.getElementById('batchPanel').style.display = selectedPlayers.size > 0 ? '' : 'none';
      filterPlayers();
    }
    async function executeBatch() {
      if (!selectedPlayers.size) return toast('请先选择玩家');
      const val = document.getElementById('batchValue').value;
      const act = document.getElementById('batchAction').value;
      showConfirm(`确定对 ${selectedPlayers.size} 名玩家执行操作？`, async () => {
        const res = await ADM.post('/batch-update', { player_ids: [...selectedPlayers], action: act, value: parseInt(val)||0 });
        toast(res.msg);
        if (res.code===0) { toggleBatchMode(); loadPlayers(); }
      });
    }

    // === Export ===
    function exportPlayers() {
      const a = document.createElement('a');
      a.href = API_BASE + '/export-players';
      a.download = 'players.csv';
      // Need to set header manually
      fetch(API_BASE+'/export-players', { headers: ADM.authHeaders() }).then(r=>r.blob()).then(blob=>{
        const url = URL.createObjectURL(blob);
        a.href = url; a.click(); URL.revokeObjectURL(url);
        toast('导出成功');
      });
    }

    // === Config ===
    let configItems = [];
    async function loadConfig() {
      try {
        const res = await ADM.get('/game-config');
        if (res.code !== 0) { toast('加载配置失败: ' + (res.msg||'请重新登录')); return; }
        const d = res.data;
        configItems = [
          { key:'resource.initGold', label:'初始金币', value:d.resource.initGold, type:'number' },
          { key:'resource.initDiamond', label:'初始钻石', value:d.resource.initDiamond, type:'number' },
          { key:'resource.initShard', label:'初始碎片', value:d.resource.initShard, type:'number' },
          { key:'newbieFreeDraws', label:'新手免费抽', value:d.newbieFreeDraws, type:'number' },
          { key:'resource.trainDailyLimit', label:'训练每日次数', value:d.resource.trainDailyLimit, type:'number' },
          { key:'resource.pvpDailyLimit', label:'PVP每日次数', value:d.resource.pvpDailyLimit, type:'number' },
          { key:'pvpCooldownMs', label:'PVP冷却(秒)', value:d.pvpCooldownMs/1000, type:'number', saveKey:'pvpCooldownMs', saveTransform:v=>v*1000 },
          { key:'pool.normal.B', label:'金币池B概率(%)', value:d.pool.normal.B, type:'number' },
          { key:'pool.normal.A', label:'金币池A概率(%)', value:d.pool.normal.A, type:'number' },
          { key:'pool.normal.S', label:'金币池S概率(%)', value:d.pool.normal.S, type:'number' },
          { key:'pool.normal.SS', label:'金币池SS概率(%)', value:d.pool.normal.SS, type:'number' },
          { key:'pool.normal.SSS', label:'金币池SSS概率(%)', value:d.pool.normal.SSS, type:'number' },
          { key:'pool.premium.B', label:'钻石池B概率(%)', value:d.pool.premium.B, type:'number' },
          { key:'pool.premium.A', label:'钻石池A概率(%)', value:d.pool.premium.A, type:'number' },
          { key:'pool.premium.S', label:'钻石池S概率(%)', value:d.pool.premium.S, type:'number' },
          { key:'pool.premium.SS', label:'钻石池SS概率(%)', value:d.pool.premium.SS, type:'number' },
          { key:'pool.premium.SSS', label:'钻石池SSS概率(%)', value:d.pool.premium.SSS, type:'number' },
          { key:'drawCost.normal.gold', label:'单抽金币消耗', value:d.drawCost.normal.gold, type:'number' },
          { key:'drawCost.normal.tenGold', label:'十连金币消耗', value:d.drawCost.normal.tenGold, type:'number' },
          { key:'drawCost.premium.diamond', label:'单抽钻石消耗', value:d.drawCost.premium.diamond, type:'number' },
          { key:'drawCost.premium.tenDiamond', label:'十连钻石消耗', value:d.drawCost.premium.tenDiamond, type:'number' },
          { key:'growthPerStar.B', label:'B级每星成长', value:d.growthPerStar.B, type:'number' },
          { key:'growthPerStar.A', label:'A级每星成长', value:d.growthPerStar.A, type:'number' },
          { key:'growthPerStar.S', label:'S级每星成长', value:d.growthPerStar.S, type:'number' },
          { key:'growthPerStar.SS', label:'SS级每星成长', value:d.growthPerStar.SS, type:'number' },
          { key:'growthPerStar.SSS', label:'SSS级每星成长', value:d.growthPerStar.SSS, type:'number' },
          { key:'sTalentMultiplier', label:'S天赋倍率(%)', value:d.sTalentMultiplier*100, type:'number', saveTransform:v=>v/100 },
          { key:'shardExchange.S', label:'S兑换碎片消耗', value:d.shardExchange.S?d.shardExchange.S.cost:'-', type:'number' },
          { key:'shardExchange.SS', label:'SS兑换碎片消耗', value:d.shardExchange.SS?d.shardExchange.SS.cost:'-', type:'number' },
          { key:'shardExchange.SSS', label:'SSS兑换碎片消耗', value:d.shardExchange.SSS?d.shardExchange.SSS.cost:'-', type:'number' },
          { key:'leaderboardLimit', label:'排行榜人数', value:d.leaderboardLimit, type:'number' },
          { key:'rankedWinPoints', label:'排位胜利加分', value:d.rankedWinPoints, type:'number' },
          { key:'rankedLosePoints', label:'排位失败扣分', value:d.rankedLosePoints, type:'number' },
        ];
        renderConfig();
      } catch(e) { toast('配置加载异常: ' + e.message); }
    }
    function renderConfig() {
      document.getElementById('configGrid').innerHTML = configItems.map((item, i) =>
        `<div class="config-item">
          <div class="cl">${item.label}</div>
          <input type="number" step="any" value="${item.value}" data-idx="${i}"
            style="width:100%;margin-top:0.2rem;padding:0.3rem;background:#0d1520;border:1px solid #2a3a4a;border-radius:3px;color:#ff9800;font-size:0.95rem;font-weight:600;"
            onchange="updateConfigItem(${i}, this.value)">
        </div>`
      ).join('');
    }
    function updateConfigItem(idx, val) {
      configItems[idx].value = parseFloat(val) || 0;
    }
    async function saveAllConfig() {
      let saved = 0;
      for (const item of configItems) {
        const saveKey = item.saveKey || item.key;
        let saveVal = item.value;
        if (item.saveTransform) saveVal = item.saveTransform(saveVal);
        // Handle shardExchange sub-key
        if (item.key.startsWith('shardExchange.')) {
          saveVal = { cost: saveVal };
        }
        const res = await ADM.post('/update-config', { configKey: saveKey, configValue: saveVal });
        if (res.code === 0) saved++;
      }
      toast(`已保存 ${saved}/${configItems.length} 项配置`);
    }
    async function resetAllConfig() {
      showConfirm('确定要重置所有配置为默认值？', async () => {
        const res = await ADM.post('/reset-config', {});
        toast(res.msg);
        if (res.code === 0) loadConfig();
      });
    }

    // === Clear ===
    async function loadClearPlayers() {
      const res = await ADM.get('/players');
      if (res.code === 0) {
        allPlayers = res.data;
        const sel = document.getElementById('clearPlayerSelect');
        sel.innerHTML = '<option value="">-- 选择玩家 --</option>' + res.data.map(p=>`<option value="${p.player_id}">${p.nickname} (${p.game_id})</option>`).join('');
      }
    }
    async function onClearSelect() {
      const pid = document.getElementById('clearPlayerSelect').value;
      if (!pid) { document.getElementById('clearInfo').style.display='none'; return; }
      const p = allPlayers.find(x=>x.player_id===parseInt(pid));
      if (!p) return;
      const cardsRes = await ADM.get('/player-cards/' + pid);
      const cardCount = cardsRes.code===0 ? cardsRes.data.length : 0;
      document.getElementById('clearStats').innerHTML = `
        <div class="stat-card"><div class="label">金币</div><div class="value" style="font-size:1rem;">${p.gold}</div></div>
        <div class="stat-card"><div class="label">钻石</div><div class="value" style="font-size:1rem;">${p.diamond}</div></div>
        <div class="stat-card"><div class="label">碎片</div><div class="value" style="font-size:1rem;">${p.upgrade_shard}</div></div>
        <div class="stat-card"><div class="label">卡牌</div><div class="value" style="font-size:1rem;">${cardCount}</div></div>
      `;
      document.getElementById('clearInfo').style.display = '';
    }
    function confirmClear() {
      const pid = document.getElementById('clearPlayerSelect').value;
      if (!pid) return toast('请先选择玩家');
      const p = allPlayers.find(x=>x.player_id===parseInt(pid));
      const items = [];
      if (document.getElementById('clearCards').checked) items.push('卡牌');
      if (document.getElementById('clearGold').checked) items.push('金币');
      if (document.getElementById('clearDiamond').checked) items.push('钻石');
      if (document.getElementById('clearShard').checked) items.push('碎片');
      if (!items.length) return toast('至少选择一项');
      showConfirm(`确定清空 ${p.nickname} 的${items.join('、')}？此操作不可撤销！`, executeClear);
    }
    async function executeClear() {
      const pid = document.getElementById('clearPlayerSelect').value;
      const res = await ADM.post('/clear-player', {
        player_id: parseInt(pid),
        clear_cards: document.getElementById('clearCards').checked,
        clear_gold: document.getElementById('clearGold').checked,
        clear_diamond: document.getElementById('clearDiamond').checked,
        clear_shard: document.getElementById('clearShard').checked
      });
      closeModal('confirmModal');
      toast(res.msg);
      if (res.code===0) { loadClearPlayers(); onClearSelect(); }
    }

    // === Utils ===
    function openModal(id) { document.getElementById(id).classList.add('show'); }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }
    function showConfirm(msg, fn) {
      document.getElementById('confirmMsg').textContent = msg;
      const btn = document.getElementById('confirmBtn');
      btn.onclick = () => { closeModal('confirmModal'); fn(); };
      openModal('confirmModal');
    }
    function formatTime(ts) {
      if (!ts) return '--';
      const d = new Date(ts);
      return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
    function typeLabel(t) {
      const m = {training:'训练',league_battle:'联赛',elite_battle:'精英',pvp_ranked:'排位',pvp_casual:'娱乐'};
      return m[t]||t;
    }

    // === Init ===
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('loginPass').addEventListener('keypress', e=>{ if(e.key==='Enter') doLogin(); });
      if (ADM.id) {
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('adminLayout').classList.add('show');
        document.getElementById('adminName').textContent = '管理员';
        loadDashboard();
      }
    });
  </script>
</body>
</html>
