<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>巢湖篮球经理 - 日常训练</title>
  <link rel="stylesheet" href="../css/base.css">   <link rel="stylesheet" href="../css/components.css">   <link rel="stylesheet" href="../css/layout.css">   <link rel="stylesheet" href="../css/pages.css">   <link rel="stylesheet" href="../css/animations.css">
  <style>
    /* 对战区域 */
    .battle-vs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.6rem 0;
      margin-bottom: 0.5rem;
    }
    .battle-side-label {
      font-size: 0.75rem;
      color: #888;
      text-align: center;
    }
    .battle-vs-text {
      font-size: 1.4rem;
      color: #ff9800;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
      padding: 0 0.8rem;
    }
    .battle-team {
      flex: 1;
    }
    .battle-team-title {
      font-size: 0.75rem;
      color: #6a9aff;
      text-align: center;
      margin-bottom: 0.4rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid #2a2a4a;
    }
    .battle-team.enemy .battle-team-title {
      color: #ff5252;
    }
    .battle-player-item {
      display: flex;
      align-items: center;
      padding: 0.35rem 0.4rem;
      margin-bottom: 0.2rem;
      background: #12122a;
      border: 2px solid #2a2a4a;
      border-radius: 3px;
    }
    .battle-player-item .grade-tag {
      margin-right: 0.3rem;
      flex-shrink: 0;
    }
    .battle-player-name {
      flex: 1;
      font-size: 0.7rem;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .battle-player-pos {
      font-size: 0.6rem;
      color: #888;
      margin-left: 0.3rem;
      flex-shrink: 0;
    }
    .battle-player-stars {
      font-size: 0.55rem;
      color: #ffd700;
      margin-left: 0.3rem;
      flex-shrink: 0;
    }
    /* 对战按钮 */
    .train-battle-btn {
      display: block;
      width: 100%;
      margin: 0.8rem 0;
    }
    /* 结果面板 */
    .result-mask {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .result-panel {
      width: 95%;
      max-width: 24rem;
      max-height: 85vh;
      overflow-y: auto;
    }
    .result-header {
      text-align: center;
      padding: 0.6rem 0;
      border-bottom: 2px solid #4a4a8a;
      margin-bottom: 0.5rem;
    }
    .result-win {
      font-size: 1.4rem;
      color: #ffd700;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
    }
    .result-lose {
      font-size: 1.4rem;
      color: #ff5252;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
    }
    .result-score {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 0.3rem;
    }
    .result-reward {
      text-align: center;
      padding: 0.4rem;
      margin-bottom: 0.5rem;
      border: 1px dashed #4a4a8a;
      border-radius: 3px;
    }
    .result-reward-label {
      font-size: 0.7rem;
      color: #888;
      margin-bottom: 0.2rem;
    }
    .result-reward-values {
      font-size: 0.85rem;
      color: #ffd700;
    }
    .result-section-title {
      font-size: 0.75rem;
      color: #ff9800;
      border-bottom: 1px solid #4a4a8a;
      padding-bottom: 0.2rem;
      margin-bottom: 0.3rem;
    }
    .result-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.65rem;
      margin-bottom: 0.6rem;
    }
    .result-table th {
      color: #888;
      padding: 0.25rem 0.15rem;
      text-align: center;
      border-bottom: 1px solid #2a2a4a;
      font-weight: normal;
    }
    .result-table td {
      padding: 0.25rem 0.15rem;
      text-align: center;
      color: #e0e0e0;
      border-bottom: 1px solid #1a1a2e;
    }
    .result-table .player-name-cell {
      text-align: left;
      max-width: 4rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-close-btn {
      margin-top: 0.5rem;
    }
    /* 空阵容提示 */
    .empty-hint {
      text-align: center;
      color: #ff5252;
      font-size: 0.85rem;
      padding: 2rem 0;
    }
    .empty-hint a {
      color: #6a9aff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <!-- 顶部标题栏 -->
  <div class="home-header">
    <span class="home-title">日常训练</span>
    <span class="home-nickname" id="nicknameDisplay">加载中...</span>
  </div>

  <div class="home-content" id="mainContent">
    <!-- 对战区域 -->
    <div class="battle-vs">
      <div class="battle-team" id="myTeam">
        <div class="battle-team-title">我方阵容</div>
        <div id="myTeamCards"></div>
      </div>
      <div class="battle-vs-text">VS</div>
      <div class="battle-team enemy" id="aiTeam">
        <div class="battle-team-title">对手阵容</div>
        <div id="aiTeamCards">
          <div style="text-align:center;color:#666;font-size:0.7rem;padding:0.5rem 0;">???</div>
        </div>
      </div>
    </div>

    <!-- 对战按钮 -->
    <button class="pixel-btn primary train-battle-btn" id="btnBattle">开始训练</button>
    <div style="text-align:center;font-size:0.6rem;color:#666;margin-top:-0.4rem;margin-bottom:0.5rem;">
      每日限30次 · 胜利获得金币50~200
    </div>
    <div style="text-align:center;font-size:0.6rem;color:#ff9800;margin-bottom:0.5rem;" id="trainRemain"></div>

    <!-- 联赛入口 -->
    <div class="panel-title" style="margin-top:0.6rem;">更多对战</div>
    <button class="pixel-btn" id="btnLeague" style="margin-bottom:0.5rem;">梯队联赛</button>
    <button class="pixel-btn" id="btnElite" style="margin-bottom:0.5rem;">精英挑战赛</button>
    <button class="pixel-btn" id="btnPvp" style="margin-bottom:0.5rem;">真人PVP</button>
  </div>

  <div id="navContainer"></div>
  <script>renderBottomNav('train');</script>

  <div style="height: 4.5rem;"></div>

  <!-- 结果弹窗 -->
  <div class="result-mask" id="resultMask" style="display:none;">
    <div class="result-panel pixel-border">
      <div class="result-header">
        <div id="resultTitle"></div>
        <div class="result-score" id="resultScore"></div>
      </div>
      <div class="result-reward" id="resultReward"></div>
      <div class="result-section-title">我方数据</div>
      <table class="result-table" id="myStatsTable">
        <thead><tr><th>球员</th><th>位置</th><th>得分</th><th>篮板</th><th>助攻</th><th>抢断</th><th>盖帽</th></tr></thead>
        <tbody id="myStatsBody"></tbody>
      </table>
      <div class="result-section-title">对手数据</div>
      <table class="result-table" id="aiStatsTable">
        <thead><tr><th>球员</th><th>位置</th><th>得分</th><th>篮板</th><th>助攻</th><th>抢断</th><th>盖帽</th></tr></thead>
        <tbody id="aiStatsBody"></tbody>
      </table>
      <button class="pixel-btn primary result-close-btn" id="btnResultClose">继续训练</button>
    </div>
  </div>

  <script src="../js/core/router.js"></script>
  <script src="../js/core/store.js"></script>
  <script src="../js/components/nav.js"></script>
  <script src="../js/components/modal.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="/config/game-config.js"></script>
  <script>
    if (!localStorage.getItem('player_id')) {
      window.location.href = 'index.html';
    }

    const ATTR_LABELS = {
      threept: '三分', midshot: '中投', dunk: '扣篮',
      rebound: '篮板', block: '盖帽', speed: '速度',
      pass: '传球', steal: '抢断'
    };

    let myCards = [];
    let isBattling = false;

    // 导航
    
    
    
    
    document.getElementById('btnLeague').addEventListener('click', () => { window.location.href = 'league.html'; });
    document.getElementById('btnElite').addEventListener('click', () => { window.location.href = 'elite.html'; });
    document.getElementById('btnPvp').addEventListener('click', () => { window.location.href = 'pvp.html'; });

    // 并行加载基础数据
    async function loadBaseData() {
      const [infoRes, statusRes] = await Promise.all([
        API.get('/api/player/info'),
        API.get('/api/training/status')
      ]);
      if (infoRes.code === 0) {
        document.getElementById('nicknameDisplay').textContent = infoRes.data.nickname;
      }
      if (statusRes.code === 0) {
        const s = statusRes.data;
        document.getElementById('trainRemain').textContent = '今日剩余: ' + s.remaining + '/' + s.dailyLimit;
        if (s.remaining <= 0) {
          document.getElementById('btnBattle').disabled = true;
          document.getElementById('btnBattle').textContent = '今日次数已用完';
        }
      }
    }

    // 加载我方阵容
    async function loadMyDeck() {
      try {
        const [deckRes, cardsRes] = await Promise.all([
          API.get('/api/player/deck'),
          API.get('/api/player/cards')
        ]);

        if (deckRes.code !== 0) {
          document.getElementById('myTeamCards').innerHTML = '<div class="empty-hint">阵容数据异常</div>';
          return;
        }

        const deck = deckRes.data;
        if (!deck.slot1_card || !deck.slot2_card || !deck.slot3_card || !deck.slot4_card || !deck.slot5_card) {
          document.getElementById('myTeamCards').innerHTML = '<div class="empty-hint">阵容未填满<br>请先 <a href="lineup.html">设置阵容</a></div>';
          document.getElementById('btnBattle').disabled = true;
          return;
        }

        if (cardsRes.code !== 0) {
          document.getElementById('myTeamCards').innerHTML = '<div class="empty-hint">获取卡牌数据失败</div>';
          return;
        }

        const allCards = cardsRes.data || [];
        const uids = [deck.slot1_card, deck.slot2_card, deck.slot3_card, deck.slot4_card, deck.slot5_card];
        myCards = uids.map(uid => allCards.find(c => c.card_uid === uid || c.card_uid === Number(uid))).filter(Boolean);

        if (myCards.length !== 5) {
          document.getElementById('myTeamCards').innerHTML = '<div class="empty-hint">阵容数据异常</div>';
          return;
        }

        renderMyTeam();
      } catch (e) {
        document.getElementById('myTeamCards').innerHTML = '<div class="empty-hint">加载失败，请刷新重试</div>';
      }
    }

    function renderMyTeam() {
      const el = document.getElementById('myTeamCards');
      el.innerHTML = myCards.map(c => {
        const color = gradeColor(c.grade);
        return `<div class="battle-player-item" style="border-color:${color};">
          <span class="grade-tag grade-${c.grade}">${c.grade}</span>
          <span class="battle-player-name" style="color:${color};">${c.role_name}</span>
          <span class="battle-player-pos">${c.pos}</span>
          <span class="battle-player-stars">${'★'.repeat(c.star)}</span>
        </div>`;
      }).join('');
    }

    function renderStatsRow(player) {
      return `<tr>
        <td class="player-name-cell" style="color:${gradeColor(player.grade)};">${player.name}</td>
        <td>${player.pos}</td>
        <td>${player.score}</td>
        <td>${player.rebound}</td>
        <td>${player.assist}</td>
        <td>${player.steal}</td>
        <td>${player.block}</td>
      </tr>`;
    }

    // 开始对战
    document.getElementById('btnBattle').addEventListener('click', debounce(async () => {
      if (isBattling) return;
      isBattling = true;
      const btn = document.getElementById('btnBattle');
      btn.textContent = '对战中...';
      btn.disabled = true;

      const res = await API.post('/api/training/battle', {});

      isBattling = false;
      btn.textContent = '开始训练';
      btn.disabled = false;

      if (res.code !== 0) {
        showToast(res.msg || '对战失败');
        return;
      }

      const data = res.data;

      // 渲染AI阵容（对战后显示）
      const aiEl = document.getElementById('aiTeamCards');
      aiEl.innerHTML = data.aiCards.map(c => {
        const color = gradeColor(c.grade);
        return `<div class="battle-player-item" style="border-color:${color};">
          <span class="grade-tag grade-${c.grade}">${c.grade}</span>
          <span class="battle-player-name" style="color:${color};">${c.name}</span>
          <span class="battle-player-pos">${c.pos}</span>
          <span class="battle-player-stars">${'★'.repeat(c.star)}</span>
        </div>`;
      }).join('');

      // 渲染结果弹窗
      document.getElementById('resultTitle').innerHTML = data.win
        ? '<div class="result-win">胜 利!</div>'
        : '<div class="result-lose">落 败</div>';
      document.getElementById('resultScore').textContent = data.attScore + ' : ' + data.defScore;

      if (data.win) {
        document.getElementById('resultReward').innerHTML =
          '<div class="result-reward-label">获得奖励</div>' +
          '<div class="result-reward-values">金币 +' + data.reward.gold + '</div>';
        // 更新首页缓存
        localStorage.setItem('gold', data.updatedGold);
      } else {
        document.getElementById('resultReward').innerHTML =
          '<div class="result-reward-label" style="color:#888;">未获得奖励</div>';
      }

      document.getElementById('myStatsBody').innerHTML = data.myCards.map(renderStatsRow).join('');
      document.getElementById('aiStatsBody').innerHTML = data.aiCards.map(renderStatsRow).join('');

      document.getElementById('resultMask').style.display = 'flex';

      // 刷新训练剩余次数
      const statusRes = await API.get('/api/training/status');
      if (statusRes.code === 0) {
        const s = statusRes.data;
        document.getElementById('trainRemain').textContent = '今日剩余: ' + s.remaining + '/' + s.dailyLimit;
        if (s.remaining <= 0) {
          document.getElementById('btnBattle').disabled = true;
          document.getElementById('btnBattle').textContent = '今日次数已用完';
        }
      }
    }, 800));

    // 关闭结果弹窗
    document.getElementById('btnResultClose').addEventListener('click', () => {
      document.getElementById('resultMask').style.display = 'none';
    });

    // 初始化：并行加载基础数据和阵容
    Promise.all([loadBaseData(), loadMyDeck()]);
  </script>
</body>
</html>
