<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>巢湖篮球经理 - 登录</title>
  <link rel="stylesheet" href="../css/base.css">   <link rel="stylesheet" href="../css/components.css">   <link rel="stylesheet" href="../css/layout.css">   <link rel="stylesheet" href="../css/pages.css">   <link rel="stylesheet" href="../css/animations.css">
  <style>
    html, body { height: 100%; }
    body {
      background: #0d0d1a url('assets/backgroud.jpg') center center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-container {
      width: 90%;
      max-width: 20rem;
      padding: 1.6rem 1.2rem;
      background: rgba(13, 13, 26, 0.88);
      border: 3px solid #4a4a8a;
      border-radius: 6px;
      box-shadow: 0 0 2rem rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .auth-logo {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 0.2rem;
    }
    .auth-subtitle {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #aaa;
    }
    .auth-divider {
      width: 40%;
      height: 2px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(90deg, transparent, #4a4a8a, transparent);
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">巢湖篮球经理</div>
    <div class="auth-subtitle">3v3 数值卡牌对战</div>
    <div class="auth-divider"></div>

    <form class="auth-form" id="loginForm">
      <div class="form-group">
        <label>游戏ID</label>
        <input type="text" class="pixel-input" id="gameId" placeholder="请输入游戏ID" autocomplete="off" maxlength="12">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" class="pixel-input" id="password" placeholder="请输入密码" autocomplete="off" maxlength="20">
      </div>
      <button type="submit" class="pixel-btn primary auth-btn">登 录</button>
    </form>

    <a href="register.html" class="auth-link">没有账号？立即注册</a>
  </div>

  <script src="../js/core/router.js"></script>
  <script src="../js/core/store.js"></script>
  <script src="../js/components/nav.js"></script>
  <script src="../js/components/modal.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    // 校验登录态，已登录直接跳主页
    if (localStorage.getItem('player_id')) {
      window.location.href = 'home.html';
    }

    const loginForm = document.getElementById('loginForm');
    const gameId = document.getElementById('gameId');
    const password = document.getElementById('password');

    // 输入框适配软键盘
    gameId.addEventListener('focus', () => {
      setTimeout(() => gameId.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
    });
    password.addEventListener('focus', () => {
      setTimeout(() => password.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
    });

    let isSubmitting = false;
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isSubmitting) return;

      const id = gameId.value.trim();
      const pwd = password.value.trim();

      if (!id) return showToast('请输入游戏ID');
      if (!pwd) return showToast('请输入密码');

      isSubmitting = true;
      const btn = loginForm.querySelector('button[type="submit"]');
      const originText = btn.textContent;
      btn.textContent = '登录中...';
      btn.disabled = true;

      try {
        const res = await API.post('/api/auth/login', { game_id: id, password: pwd });
        if (res.code !== 0) {
          showToast(res.msg || '登录失败');
          return;
        }

        localStorage.setItem('player_id', res.data.player_id);
        localStorage.setItem('nickname', res.data.nickname);
        localStorage.setItem('game_id', res.data.game_id);
        localStorage.setItem('free_draws', res.data.free_draws);

        showToast('登录成功');
        setTimeout(() => { window.location.href = 'home.html'; }, 500);
      } catch (err) {
        showToast('网络异常，请重试');
      } finally {
        isSubmitting = false;
        btn.textContent = originText;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
