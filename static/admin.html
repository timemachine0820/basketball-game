<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员后台 - 篮球卡牌游戏</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    @media screen and (max-width: 768px) {
      body::after {
        content: '请使用PC端访问管理后台';
        position: fixed;
        inset: 0;
        background: #1a1a2e;
        color: #ff9800;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        z-index: 99999;
      }
    }

    .admin-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1rem;
      background: #0d0d1a;
      border-bottom: 3px solid #4a4a8a;
      margin-bottom: 1rem;
    }

    .admin-title {
      font-size: 1.2rem;
      color: #ff9800;
      text-shadow: 2px 2px 0 #000;
    }

    .admin-user {
      font-size: 0.8rem;
      color: #aaa;
    }

    .admin-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .admin-tab {
      flex: 1;
      text-align: center;
      padding: 0.6rem;
      font-size: 0.85rem;
      border: 3px solid #4a4a8a;
      border-radius: 4px;
      background: #1a1a2e;
      color: #888;
      cursor: pointer;
    }

    .admin-tab.active {
      background: #3a3a6a;
      color: #ff9800;
      border-color: #ff9800;
    }

    .admin-section {
      display: none;
    }

    .admin-section.active {
      display: block;
    }

    .player-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1rem;
    }

    .player-table th,
    .player-table td {
      padding: 0.5rem;
      border: 2px solid #4a4a8a;
      text-align: center;
      font-size: 0.8rem;
    }

    .player-table th {
      background: #3a3a6a;
      color: #ff9800;
    }

    .player-table tr:hover {
      background: #2a2a4a;
    }

    .player-table .action-btn {
      padding: 0.3rem 0.5rem;
      font-size: 0.7rem;
      width: auto;
      display: inline-block;
    }

    .config-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .config-item {
      padding: 0.8rem;
    }

    .config-label {
      font-size: 0.75rem;
      color: #aaa;
      margin-bottom: 0.3rem;
    }

    .config-value {
      font-size: 1rem;
      color: #ff9800;
      font-weight: bold;
    }

    .clear-panel {
      padding: 1rem;
    }

    .clear-title {
      font-size: 1rem;
      color: #ff9800;
      margin-bottom: 0.8rem;
    }

    .player-select {
      width: 100%;
      padding: 0.6rem;
      background: #0d0d1a;
      border: 3px solid #4a4a8a;
      border-radius: 4px;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .clear-options {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .clear-option {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .clear-option input[type="checkbox"] {
      width: 1.2rem;
      height: 1.2rem;
      accent-color: #ff9800;
    }

    .clear-option label {
      font-size: 0.85rem;
      color: #e0e0e0;
      cursor: pointer;
    }

    .player-info {
      margin-bottom: 1rem;
      padding: 0.6rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }

    .info-item {
      text-align: center;
    }

    .info-label {
      font-size: 0.65rem;
      color: #888;
    }

    .info-value {
      font-size: 0.9rem;
      color: #e0e0e0;
    }

    .confirm-dialog {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .confirm-dialog.show {
      display: flex;
    }

    .confirm-panel {
      width: 90%;
      max-width: 400px;
    }

    .confirm-title {
      font-size: 1rem;
      color: #ff9800;
      text-align: center;
      margin-bottom: 0.8rem;
    }

    .confirm-msg {
      font-size: 0.85rem;
      color: #e0e0e0;
      text-align: center;
      margin-bottom: 1rem;
    }

    .confirm-btns {
      display: flex;
      gap: 0.5rem;
    }

    .confirm-btns .pixel-btn {
      flex: 1;
    }
  </style>
</head>
<body>
  <div id="loginSection" class="admin-container" style="max-width: 400px; margin-top: 10vh;">
    <div class="pixel-border" style="padding: 2rem;">
      <div class="auth-logo" style="text-align: center; margin-bottom: 0.4rem;">管理员后台</div>
      <div class="auth-subtitle" style="text-align: center;">篮球卡牌游戏管理系统</div>
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="adminUsername" class="pixel-input" placeholder="请输入管理员用户名">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="adminPassword" class="pixel-input" placeholder="请输入密码">
      </div>
      <button class="pixel-btn primary auth-btn" onclick="adminLogin()">登录</button>
    </div>
  </div>

  <div id="mainSection" class="admin-container" style="display: none;">
    <div class="admin-header">
      <div class="admin-title">管理员后台</div>
      <div class="admin-user">
        <span id="adminName"></span>
        <button class="pixel-btn" style="width: auto; display: inline-block; padding: 0.3rem 0.6rem; margin-left: 0.5rem;" onclick="adminLogout()">退出</button>
      </div>
    </div>

    <div class="admin-tabs">
      <div class="admin-tab active" data-tab="players">玩家管理</div>
      <div class="admin-tab" data-tab="config">游戏配置</div>
      <div class="admin-tab" data-tab="clear">数据清理</div>
    </div>

    <div id="playersSection" class="admin-section active">
      <div class="pixel-border">
        <div class="panel-title">玩家列表</div>
        <table class="player-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>游戏ID</th>
              <th>昵称</th>
              <th>金币</th>
              <th>钻石</th>
              <th>碎片</th>
              <th>卡牌数</th>
              <th>总抽</th>
              <th>S卡</th>
            </tr>
          </thead>
          <tbody id="playerList"></tbody>
        </table>
      </div>
    </div>

    <div id="configSection" class="admin-section">
      <div class="pixel-border">
        <div class="panel-title">游戏配置</div>
        <div class="config-grid" id="configGrid"></div>
      </div>
    </div>

    <div id="clearSection" class="admin-section">
      <div class="pixel-border clear-panel">
        <div class="clear-title">玩家数据清理</div>
        <select id="clearPlayerSelect" class="player-select" onchange="onPlayerSelect()">
          <option value="">-- 请选择玩家 --</option>
        </select>
        <div id="selectedPlayerInfo" class="player-info pixel-border" style="display: none;">
          <div class="info-grid">
            <div class="info-item">
              <div class="info-label">金币</div>
              <div class="info-value" id="infoGold">0</div>
            </div>
            <div class="info-item">
              <div class="info-label">钻石</div>
              <div class="info-value" id="infoDiamond">0</div>
            </div>
            <div class="info-item">
              <div class="info-label">碎片</div>
              <div class="info-value" id="infoShard">0</div>
            </div>
            <div class="info-item">
              <div class="info-label">卡牌数</div>
              <div class="info-value" id="infoCards">0</div>
            </div>
          </div>
        </div>
        <div class="clear-options">
          <div class="clear-option">
            <input type="checkbox" id="clearCards" checked>
            <label for="clearCards">清空卡牌</label>
          </div>
          <div class="clear-option">
            <input type="checkbox" id="clearGold" checked>
            <label for="clearGold">清空金币</label>
          </div>
          <div class="clear-option">
            <input type="checkbox" id="clearDiamond" checked>
            <label for="clearDiamond">清空钻石</label>
          </div>
          <div class="clear-option">
            <input type="checkbox" id="clearShard" checked>
            <label for="clearShard">清空碎片</label>
          </div>
        </div>
        <button class="pixel-btn danger" onclick="confirmClear()">执行清理</button>
      </div>
    </div>
  </div>

  <div id="confirmDialog" class="confirm-dialog">
    <div class="confirm-panel pixel-border">
      <div class="confirm-title">确认操作</div>
      <div class="confirm-msg" id="confirmMsg"></div>
      <div class="confirm-btns">
        <button class="pixel-btn" onclick="closeConfirm()">取消</button>
        <button class="pixel-btn danger" onclick="executeClear()">确认清理</button>
      </div>
    </div>
  </div>

  <div id="toast" class="pixel-toast"></div>

  <script>
    const ADMIN_API = {
      adminId: null,

      async post(url, data) {
        const headers = { 'Content-Type': 'application/json' };
        if (this.adminId) {
          headers['X-Admin-Id'] = this.adminId;
        }
        const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(data) });
        return res.json();
      },

      async get(url) {
        const headers = {};
        if (this.adminId) {
          headers['X-Admin-Id'] = this.adminId;
        }
        const res = await fetch(url, { method: 'GET', headers });
        return res.json();
      }
    };

    let allPlayers = [];

    function showToast(msg, duration = 2000) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    async function adminLogin() {
      const username = document.getElementById('adminUsername').value.trim();
      const password = document.getElementById('adminPassword').value.trim();

      if (!username || !password) {
        showToast('请输入用户名和密码');
        return;
      }

      const result = await ADMIN_API.post('/api/admin/login', { username, password });
      if (result.code === 0) {
        ADMIN_API.adminId = result.data.admin_id;
        document.getElementById('adminName').textContent = result.data.username;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('mainSection').style.display = 'block';
        loadPlayers();
        loadConfig();
      } else {
        showToast(result.msg);
      }
    }

    function adminLogout() {
      ADMIN_API.adminId = null;
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('mainSection').style.display = 'none';
      document.getElementById('adminUsername').value = '';
      document.getElementById('adminPassword').value = '';
    }

    function initTabs() {
      const tabs = document.querySelectorAll('.admin-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
          document.getElementById(tab.dataset.tab + 'Section').classList.add('active');
        });
      });
    }

    async function loadPlayers() {
      const result = await ADMIN_API.get('/api/admin/players');
      if (result.code === 0) {
        allPlayers = result.data;
        renderPlayerList(allPlayers);
        renderPlayerSelect(allPlayers);
      }
    }

    function renderPlayerList(players) {
      const tbody = document.getElementById('playerList');
      tbody.innerHTML = players.map(p => `
        <tr>
          <td>${p.player_id}</td>
          <td>${p.game_id}</td>
          <td>${p.nickname}</td>
          <td>${p.gold}</td>
          <td>${p.diamond}</td>
          <td>${p.upgrade_shard}</td>
          <td>${p.total_draw}</td>
          <td>${p.total_draw}</td>
          <td>${p.total_s}</td>
        </tr>
      `).join('');
    }

    function renderPlayerSelect(players) {
      const select = document.getElementById('clearPlayerSelect');
      const options = players.map(p => `<option value="${p.player_id}">${p.nickname} (${p.game_id})</option>`);
      select.innerHTML = '<option value="">-- 请选择玩家 --</option>' + options.join('');
    }

    async function onPlayerSelect() {
      const playerId = document.getElementById('clearPlayerSelect').value;
      const infoPanel = document.getElementById('selectedPlayerInfo');

      if (!playerId) {
        infoPanel.style.display = 'none';
        return;
      }

      const player = allPlayers.find(p => p.player_id === parseInt(playerId));
      if (player) {
        document.getElementById('infoGold').textContent = player.gold;
        document.getElementById('infoDiamond').textContent = player.diamond;
        document.getElementById('infoShard').textContent = player.upgrade_shard;
        infoPanel.style.display = 'block';

        const cardsResult = await ADMIN_API.get(`/api/admin/player-cards/${playerId}`);
        if (cardsResult.code === 0) {
          document.getElementById('infoCards').textContent = cardsResult.data.length;
        }
      }
    }

    async function loadConfig() {
      const result = await ADMIN_API.get('/api/admin/game-config');
      if (result.code === 0) {
        renderConfig(result.data);
      }
    }

    function renderConfig(config) {
      const grid = document.getElementById('configGrid');
      const items = [
        { label: '初始金币', value: config.resource.initGold },
        { label: '初始钻石', value: config.resource.initDiamond },
        { label: '初始碎片', value: config.resource.initShard },
        { label: '新手免费抽', value: config.newbieFreeDraws },
        { label: '训练每日次数', value: config.resource.trainDailyLimit },
        { label: '精英每日次数', value: 2 },
        { label: 'PVP每日次数', value: config.resource.pvpDailyLimit },
        { label: 'PVP冷却(秒)', value: config.pvpCooldownMs / 1000 },
        { label: '金币池S概率', value: config.pool.normal.S + '%' },
        { label: '钻石池S概率', value: config.pool.premium.S + '%' },
        { label: '单抽金币消耗', value: config.drawCost.normal.gold },
        { label: '单抽钻石消耗', value: config.drawCost.premium.diamond },
        { label: 'B级升星增长', value: '+' + config.growthPerStar.B + '/星' },
        { label: 'A级升星增长', value: '+' + config.growthPerStar.A + '/星' },
        { label: 'S级升星增长', value: '+' + config.growthPerStar.S + '/星' },
        { label: 'S天赋倍率', value: '+' + (config.sTalentMultiplier * 100) + '%' },
        { label: 'B级兑换碎片', value: config.shardExchange.B.cost },
        { label: 'A级兑换碎片', value: config.shardExchange.A.cost },
        { label: 'S级兑换碎片', value: config.shardExchange.S.cost },
        { label: '排行榜人数', value: config.leaderboardLimit }
      ];

      grid.innerHTML = items.map(item => `
        <div class="config-item pixel-border">
          <div class="config-label">${item.label}</div>
          <div class="config-value">${item.value}</div>
        </div>
      `).join('');
    }

    function confirmClear() {
      const playerId = document.getElementById('clearPlayerSelect').value;
      if (!playerId) {
        showToast('请先选择玩家');
        return;
      }

      const clearCards = document.getElementById('clearCards').checked;
      const clearGold = document.getElementById('clearGold').checked;
      const clearDiamond = document.getElementById('clearDiamond').checked;
      const clearShard = document.getElementById('clearShard').checked;

      if (!clearCards && !clearGold && !clearDiamond && !clearShard) {
        showToast('请至少选择一项清理内容');
        return;
      }

      const player = allPlayers.find(p => p.player_id === parseInt(playerId));
      const items = [];
      if (clearCards) items.push('卡牌');
      if (clearGold) items.push('金币');
      if (clearDiamond) items.push('钻石');
      if (clearShard) items.push('碎片');

      document.getElementById('confirmMsg').textContent = `确定要清空玩家 ${player.nickname} 的${items.join('、')}吗？此操作不可撤销！`;
      document.getElementById('confirmDialog').classList.add('show');
    }

    function closeConfirm() {
      document.getElementById('confirmDialog').classList.remove('show');
    }

    async function executeClear() {
      const playerId = document.getElementById('clearPlayerSelect').value;
      const clearCards = document.getElementById('clearCards').checked;
      const clearGold = document.getElementById('clearGold').checked;
      const clearDiamond = document.getElementById('clearDiamond').checked;
      const clearShard = document.getElementById('clearShard').checked;

      const result = await ADMIN_API.post('/api/admin/clear-player', {
        player_id: parseInt(playerId),
        clear_cards: clearCards,
        clear_gold: clearGold,
        clear_diamond: clearDiamond,
        clear_shard: clearShard
      });

      closeConfirm();

      if (result.code === 0) {
        showToast(result.msg);
        loadPlayers();
        onPlayerSelect();
      } else {
        showToast(result.msg);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      initTabs();
      document.getElementById('adminPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') adminLogin();
      });
    });
  </script>
</body>
</html>
