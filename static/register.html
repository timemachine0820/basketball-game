<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>巢湖篮球经理 - 注册</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">巢湖篮球经理</div>
    <div class="auth-subtitle">创建新账号</div>

    <form class="auth-form" id="registerForm">
      <div class="form-group">
        <label>游戏ID（登录唯一凭证）</label>
        <input type="text" class="pixel-input" id="gameId" placeholder="2-12位中英文数字" autocomplete="off" maxlength="12">
      </div>
      <div class="form-group">
        <label>展示昵称</label>
        <input type="text" class="pixel-input" id="nickname" placeholder="2-12位中英文数字" autocomplete="off" maxlength="12">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" class="pixel-input" id="password" placeholder="至少4位" autocomplete="off" maxlength="20">
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" class="pixel-input" id="passwordConfirm" placeholder="再次输入密码" autocomplete="off" maxlength="20">
      </div>
      <button type="submit" class="pixel-btn primary auth-btn">注 册</button>
    </form>

    <a href="index.html" class="auth-link">已有账号？返回登录</a>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script>
    const registerForm = document.getElementById('registerForm');

    // 软键盘适配
    document.querySelectorAll('.pixel-input').forEach(input => {
      input.addEventListener('focus', () => {
        setTimeout(() => input.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
      });
    });

    let isSubmitting = false;
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isSubmitting) return;

      const id = document.getElementById('gameId').value.trim();
      const nick = document.getElementById('nickname').value.trim();
      const pwd = document.getElementById('password').value.trim();
      const pwd2 = document.getElementById('passwordConfirm').value.trim();

      if (!id) return showToast('请输入游戏ID');
      if (!nick) return showToast('请输入展示昵称');
      if (!pwd) return showToast('请输入密码');
      if (pwd.length < 4) return showToast('密码至少4位');
      if (pwd !== pwd2) return showToast('两次密码不一致');

      isSubmitting = true;
      const btn = registerForm.querySelector('button[type="submit"]');
      const originText = btn.textContent;
      btn.textContent = '注册中...';
      btn.disabled = true;

      try {
        const res = await API.post('/api/auth/register', {
          game_id: id,
          password: pwd,
          nickname: nick
        });

        if (res.code !== 0) {
          showToast(res.msg || '注册失败');
          return;
        }

        localStorage.setItem('player_id', res.data.player_id);
        localStorage.setItem('nickname', res.data.nickname);
        localStorage.setItem('game_id', res.data.game_id);
        localStorage.setItem('free_draws', res.data.free_draws);

        showToast('注册成功，赠送50抽');
        setTimeout(() => { window.location.href = 'home.html'; }, 800);
      } catch (err) {
        showToast('网络异常，请重试');
      } finally {
        isSubmitting = false;
        btn.textContent = originText;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
